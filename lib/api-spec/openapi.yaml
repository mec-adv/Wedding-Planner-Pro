components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, planner, coordinator, couple, guest]
      required:
        - name
        - email
        - password
        - role

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, planner, coordinator, couple, guest]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - createdAt

    Wedding:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        groomName:
          type: string
        brideName:
          type: string
        date:
          type: string
          format: date-time
        civilCeremonyAt:
          type: string
          format: date-time
          nullable: true
        religiousCeremonyAt:
          type: string
          format: date-time
          nullable: true
        venue:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        coverImageUrl:
          type: ["string", "null"]
        createdById:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - groomName
        - brideName
        - date
        - createdById
        - createdAt

    WeddingInput:
      type: object
      properties:
        title:
          type: string
        groomName:
          type: string
        brideName:
          type: string
        date:
          type: string
          format: date-time
        civilCeremonyAt:
          type: string
          format: date-time
        religiousCeremonyAt:
          type: string
          format: date-time
        venue:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        coverImageUrl:
          type: ["string", "null"]

    GuestGroup:
      type: object
      properties:
        id:
          type: integer
        weddingId:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - weddingId
        - name
        - createdAt

    CreateGuestGroupBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
      required:
        - name

    UpdateGuestGroupBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
      required:
        - name

    GuestCompanion:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: integer
        phone:
          type: string
          nullable: true
          description: Celular opcional
      required:
        - id
        - name
        - age

    GuestCompanionInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        age:
          type: integer
          minimum: 0
          maximum: 120
        phone:
          type: string
          nullable: true
      required:
        - name
        - age

    Guest:
      type: object
      properties:
        id:
          type: integer
        weddingId:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        guestGroupId:
          type: integer
          nullable: true
          description: FK para grupo de convidados do casamento
        guestGroupName:
          type: string
          nullable: true
          description: Nome do grupo (somente leitura na API)
        invitedBy:
          type: string
          nullable: true
          enum: [groom, bride]
          description: Convidado pelo noivo (groom) ou pela noiva (bride)
        rsvpStatus:
          type: string
          enum: [pending, confirmed, declined, maybe]
        companions:
          type: array
          items:
            $ref: "#/components/schemas/GuestCompanion"
        companionCount:
          type: integer
          description: Número de acompanhantes (redundante para a UI)
        dietaryRestrictions:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        inviteSentAt:
          type: ["string", "null"]
          format: date-time
        inviteToken:
          type: string
          description: Token secreto para o link público (somente para equipe do casamento)
        publicInvitePath:
          type: string
          description: Caminho relativo da página pública (ex. /p/convite/{token})
        publicInviteTemplateId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - weddingId
        - name
        - rsvpStatus
        - companions
        - companionCount
        - inviteToken
        - publicInvitePath
        - createdAt

    GuestInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        guestGroupId:
          type: integer
          nullable: true
        invitedBy:
          type: string
          nullable: true
          enum: [groom, bride]
          description: Convidado pelo noivo (groom) ou pela noiva (bride)
        rsvpStatus:
          type: string
          enum: [pending, confirmed, declined, maybe]
        dietaryRestrictions:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        publicInviteTemplateId:
          type: integer
          nullable: true
          description: Modelo de página pública; null usa o padrão do casamento

    GuestImportInput:
      type: object
      properties:
        guests:
          type: array
          items:
            $ref: "#/components/schemas/GuestInput"
      required:
        - guests

    ImportResult:
      type: object
      properties:
        imported:
