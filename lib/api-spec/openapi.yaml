openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Wedding Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: weddings
    description: Wedding management
  - name: guests
    description: Guest management
  - name: guestGroups
    description: Guest group labels (per wedding)
  - name: gifts
    description: Gift registry
  - name: tasks
    description: Task management
  - name: vendors
    description: Vendor management
  - name: coordinators
    description: Coordinator management
  - name: schedule
    description: Wedding day schedule
  - name: budget
    description: Budget management
  - name: seating
    description: Seating chart
  - name: messages
    description: Messages and communication
  - name: settings
    description: Integration settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /weddings:
    get:
      operationId: listWeddings
      tags: [weddings]
      summary: List weddings
      responses:
        "200":
          description: Wedding list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Wedding"
    post:
      operationId: createWedding
      tags: [weddings]
      summary: Create wedding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeddingInput"
      responses:
        "201":
          description: Wedding created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wedding"

  /weddings/{id}:
    get:
      operationId: getWedding
      tags: [weddings]
      summary: Get wedding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Wedding detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wedding"
    patch:
      operationId: updateWedding
      tags: [weddings]
      summary: Update wedding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeddingInput"
      responses:
        "200":
          description: Wedding updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wedding"
    delete:
      operationId: deleteWedding
      tags: [weddings]
      summary: Delete wedding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /weddings/{weddingId}/guest-groups:
    get:
      operationId: listGuestGroups
      tags: [guestGroups]
      summary: List guest groups
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Guest groups for the wedding
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuestGroup"
    post:
      operationId: createGuestGroup
      tags: [guestGroups]
      summary: Create guest group
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGuestGroupBody"
      responses:
        "201":
          description: Guest group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestGroup"

  /weddings/{weddingId}/guest-groups/{id}:
    patch:
      operationId: updateGuestGroup
      tags: [guestGroups]
      summary: Update guest group
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGuestGroupBody"
      responses:
        "200":
          description: Guest group updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestGroup"
    delete:
      operationId: deleteGuestGroup
      tags: [guestGroups]
      summary: Delete guest group
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /weddings/{weddingId}/guests:
    get:
      operationId: listGuests
      tags: [guests]
      summary: List guests
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, declined, maybe]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Guest list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guest"
    post:
      operationId: createGuest
      tags: [guests]
      summary: Create guest
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestInput"
      responses:
        "201":
          description: Guest created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /weddings/{weddingId}/guests/import:
    post:
      operationId: importGuests
      tags: [guests]
      summary: Import guests from CSV/JSON
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /weddings/{weddingId}/guests/{id}:
    get:
      operationId: getGuest
      tags: [guests]
      summary: Get guest
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Guest detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
    patch:
      operationId: updateGuest
      tags: [guests]
      summary: Update guest
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestInput"
      responses:
        "200":
          description: Guest updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
    delete:
      operationId: deleteGuest
      tags: [guests]
      summary: Delete guest
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /weddings/{weddingId}/guests/{id}/rsvp:
    patch:
      operationId: updateGuestRsvp
      tags: [guests]
      summary: Update RSVP status
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RsvpInput"
      responses:
        "200":
          description: RSVP updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /weddings/{weddingId}/guests/{id}/send-invite:
    post:
      operationId: sendGuestInvite
      tags: [guests]
      summary: Send invite via email or WhatsApp
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendInviteInput"
      responses:
        "200":
          description: Invite sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendInviteResult"

  /weddings/{weddingId}/guests/{id}/rotate-invite-token:
    post:
      operationId: rotateGuestInviteToken
      tags: [guests]
      summary: Gera novo token do link público do convite
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Convidado atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /public/invite/{token}:
    get:
      operationId: getPublicInvite
      tags: [guests]
      summary: Página pública do convite (RSVP) — dados do casamento e convidado
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dados do convite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicInviteResponse"
        "404":
          description: Token inválido
    patch:
      operationId: patchPublicInviteRsvp
      tags: [guests]
      summary: Atualizar RSVP pela página pública
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RsvpInput"
      responses:
        "200":
          description: RSVP atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicInviteRsvpResult"

  /public/invite/{token}/gifts:
    get:
      operationId: listPublicInviteGifts
      tags: [gifts]
      summary: Lista de presentes (página pública)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lista de presentes ativos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Gift"

  /public/invite/{token}/gift-orders:
    post:
      operationId: createPublicGiftOrder
      tags: [gifts]
      summary: Criar pedido de presente (página pública)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicGiftOrderInput"
      responses:
        "200":
          description: Pedido idempotente já existente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftOrderResult"
        "201":
          description: Pedido criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftOrderResult"

  /weddings/{weddingId}/public-invite-templates:
    get:
      operationId: listPublicInviteTemplates
      tags: [guests]
      summary: Listar modelos de página pública do convite
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Modelos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicInviteTemplate"
    post:
      operationId: createPublicInviteTemplate
      tags: [guests]
      summary: Criar modelo de página pública
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicInviteTemplateInput"
      responses:
        "201":
          description: Criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicInviteTemplate"

  /weddings/{weddingId}/public-invite-templates/{id}:
    patch:
      operationId: updatePublicInviteTemplate
      tags: [guests]
      summary: Atualizar modelo de página pública
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicInviteTemplatePatch"
      responses:
        "200":
          description: Atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicInviteTemplate"
    delete:
      operationId: deletePublicInviteTemplate
      tags: [guests]
      summary: Excluir modelo de página pública
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Excluído

  /weddings/{weddingId}/gifts:
    get:
      operationId: listGifts
      tags: [gifts]
      summary: List gifts
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gift list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Gift"
    post:
      operationId: createGift
      tags: [gifts]
      summary: Create gift
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiftInput"
      responses:
        "201":
          description: Gift created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gift"

  /weddings/{weddingId}/gifts/{id}:
    patch:
      operationId: updateGift
      tags: [gifts]
      summary: Update gift
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiftInput"
      responses:
        "200":
          description: Gift updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gift"
    delete:
      operationId: deleteGift
      tags: [gifts]
      summary: Delete gift
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /weddings/{weddingId}/gift-orders:
    get:
      operationId: listGiftOrders
      tags: [gifts]
      summary: List gift orders / financial extract
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gift orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GiftOrder"
    post:
      operationId: createGiftOrder
      tags: [gifts]
      summary: Create gift order (checkout)
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiftOrderInput"
      responses:
        "200":
          description: Pedido idempotente já existente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftOrder"
        "201":
          description: Gift order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftOrder"

  /weddings/{weddingId}/gift-orders/summary:
    get:
      operationId: getGiftOrdersSummary
      tags: [gifts]
      summary: Get financial summary
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSummary"

  /weddings/{weddingId}/gift-orders/{orderId}/withdrawal:
    patch:
      operationId: updateWithdrawalStatus
      tags: [gifts]
      summary: Update withdrawal status of a gift order
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, available, withdrawn]
              required: [status]
      responses:
        "200":
          description: Updated gift order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftOrder"

  /weddings/{weddingId}/reminders/status:
    get:
      operationId: getRemindersStatus
      tags: [messages]
      summary: Get automatic reminders status
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reminders status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemindersStatus"

  /weddings/{weddingId}/reminders/start:
    post:
      operationId: startReminders
      tags: [messages]
      summary: Start automatic RSVP reminders
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                intervalHours:
                  type: integer
                  default: 24
      responses:
        "200":
          description: Reminders started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemindersResponse"

  /weddings/{weddingId}/reminders/stop:
    post:
      operationId: stopReminders
      tags: [messages]
      summary: Stop automatic RSVP reminders
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reminders stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemindersResponse"

  /weddings/{weddingId}/reminders/send-now:
    post:
      operationId: sendRemindersNow
      tags: [messages]
      summary: Send reminders immediately to all pending guests
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reminders sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemindersSendResult"

  /weddings/{weddingId}/tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed, cancelled]
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create task
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /weddings/{weddingId}/tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update task
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete task
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /weddings/{weddingId}/vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create vendor
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorInput"
      responses:
        "201":
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /weddings/{weddingId}/vendors/{id}:
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update vendor
      parameters:
        - name: weddingId
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorInput"
