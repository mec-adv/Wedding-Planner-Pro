<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lista de presentes</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f4f9fd;
        color: #2e3a42;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      main {
        max-width: 560px;
        background: #fff;
        border: 1px solid #d9eaf3;
        border-top: 8px solid #c9962a;
        border-radius: 16px;
        padding: 28px;
        text-align: center;
        box-shadow: 0 12px 30px rgba(44, 95, 122, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        color: #2c5f7a;
      }
      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lista de presentes</h1>
      <p>A lista de presentes sera publicada em breve.</p>
    </main>
  </body>
</html>
